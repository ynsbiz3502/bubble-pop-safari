<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#7ec8ff" />
<title>Bubble Pop Safari 🫧🐾</title>
<style>
  :root{
    --sky1:#aee9ff; --sky2:#d6f5ff; --grass:#8be08b;
    --ui:#ff7eb6; --ui2:#ffd166; --ink:#4a3b6b;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; }
  body{
    font-family:'Baloo 2','Comic Sans MS','Trebuchet MS',system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 55%,#eafff0 100%);
    user-select:none; -webkit-user-select:none; touch-action:none;
    color:var(--ink);
  }
  #game{ position:fixed; inset:0; overflow:hidden; }

  /* ground */
  .ground{
    position:absolute; left:0; right:0; bottom:0; height:16vh;
    background:linear-gradient(180deg,#a7eda7,#6fd06f);
    border-top-left-radius:50% 40px; border-top-right-radius:50% 40px;
    z-index:1;
  }
  .ground::before{
    content:"🌼🌷🌻🌸🌼🌷🌻🌸🌼🌷🌻🌸";
    position:absolute; bottom:2vh; left:0; right:0; text-align:center;
    font-size:min(6vw,42px); letter-spacing:min(4vw,30px); opacity:.9;
    white-space:nowrap;
  }
  .cloud{
    position:absolute; font-size:70px; opacity:.85; z-index:0;
    animation:drift linear infinite; will-change:transform;
  }
  @keyframes drift{ from{ transform:translateX(-140px);} to{ transform:translateX(110vw);} }

  /* HUD */
  #hud{
    position:absolute; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    pointer-events:none;
  }
  .badge{
    background:rgba(255,255,255,.82); border:4px solid #fff;
    border-radius:24px; padding:6px 16px; font-weight:800;
    font-size:clamp(18px,4.5vw,30px); display:flex; align-items:center; gap:8px;
    box-shadow:0 6px 0 rgba(0,0,0,.08); color:var(--ink);
  }
  #starBadge{ color:#f0a500; }
  .spacer{ flex:1; }
  .iconbtn{
    pointer-events:auto; cursor:pointer; border:none; background:rgba(255,255,255,.82);
    width:clamp(46px,11vw,60px); height:clamp(46px,11vw,60px); border-radius:50%;
    font-size:clamp(22px,5.5vw,30px); box-shadow:0 5px 0 rgba(0,0,0,.1);
    display:flex; align-items:center; justify-content:center; border:4px solid #fff;
  }
  .iconbtn:active{ transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.1); }

  /* progress to prize */
  #prizeWrap{
    position:absolute; top:64px; left:50%; transform:translateX(-50%);
    z-index:20; width:min(70vw,420px); pointer-events:none;
  }
  #prizeBar{
    height:20px; background:rgba(255,255,255,.6); border:4px solid #fff;
    border-radius:20px; overflow:hidden; box-shadow:0 4px 0 rgba(0,0,0,.08);
  }
  #prizeFill{
    height:100%; width:0%;
    background:linear-gradient(90deg,#ffd166,#ff9f43,#ff6b6b);
    transition:width .35s ease; border-radius:20px;
  }
  #prizeLabel{ text-align:center; font-weight:800; font-size:14px; margin-top:2px; text-shadow:0 1px 0 #fff; }

  /* bubbles */
  .bubble{
    position:absolute; z-index:5; display:flex; align-items:center; justify-content:center;
    border-radius:50%; cursor:pointer; will-change:transform;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,.95), rgba(255,255,255,.15) 38%, rgba(255,255,255,0) 55%),
      radial-gradient(circle at 70% 75%, rgba(255,255,255,.35), rgba(255,255,255,0) 40%);
    box-shadow: inset 0 0 22px rgba(255,255,255,.7), 0 8px 20px rgba(0,0,0,.10);
    border:3px solid rgba(255,255,255,.75);
  }
  .bubble .emoji{ font-size:52px; filter:drop-shadow(0 3px 2px rgba(0,0,0,.18)); pointer-events:none; }
  .bubble.gold{ box-shadow: inset 0 0 26px rgba(255,225,120,.9), 0 0 26px rgba(255,205,80,.9); border-color:#ffe08a; }
  .bubble.rainbow{ animation:rbw 2s linear infinite; }
  @keyframes rbw{ 0%{filter:hue-rotate(0)} 100%{filter:hue-rotate(360deg)} }
  .wobble{ animation:wob 3s ease-in-out infinite; }
  @keyframes wob{ 0%,100%{ transform:translateX(0) } 50%{ transform:translateX(14px) } }

  /* pop pieces */
  .piece{ position:absolute; z-index:9; pointer-events:none; will-change:transform,opacity; }
  .flyEmoji{ position:absolute; z-index:12; pointer-events:none; font-size:64px;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)); }
  .word{ position:absolute; z-index:13; pointer-events:none; font-weight:900;
    color:#fff; -webkit-text-stroke:2px var(--ink); text-stroke:2px var(--ink);
    font-size:38px; text-shadow:0 3px 0 rgba(0,0,0,.15); white-space:nowrap; }

  /* praise pop */
  #praise{
    position:absolute; z-index:30; left:50%; top:40%; transform:translate(-50%,-50%) scale(0);
    font-weight:900; font-size:clamp(34px,10vw,72px); color:#fff; text-align:center;
    -webkit-text-stroke:3px #ff5aa7; pointer-events:none;
  }
  #praise.show{ animation:praise 1.1s ease forwards; }
  @keyframes praise{
    0%{ transform:translate(-50%,-50%) scale(0) rotate(-12deg); opacity:0 }
    30%{ transform:translate(-50%,-50%) scale(1.15) rotate(4deg); opacity:1 }
    70%{ transform:translate(-50%,-50%) scale(1) rotate(-2deg); opacity:1 }
    100%{ transform:translate(-50%,-60%) scale(.9); opacity:0 }
  }

  /* mascot */
  #mascot{
    position:absolute; bottom:12vh; left:12px; z-index:15; font-size:clamp(50px,14vw,90px);
    transform-origin:bottom center; animation:hop 2.4s ease-in-out infinite;
    filter:drop-shadow(0 6px 4px rgba(0,0,0,.2));
  }
  @keyframes hop{ 0%,100%{ transform:translateY(0) } 15%{ transform:translateY(-18px) } 30%{ transform:translateY(0) } }
  #mascot.cheer{ animation:cheer .5s ease 3; }
  @keyframes cheer{ 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-26px) rotate(-10deg)} 75%{transform:translateY(-26px) rotate(10deg)} }

  /* overlays */
  .overlay{
    position:absolute; inset:0; z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:18px; padding:20px;
    background:radial-gradient(circle at 50% 30%, rgba(255,255,255,.35), rgba(120,200,255,.55));
    backdrop-filter:blur(2px);
  }
  .overlay.hidden{ display:none; }
  .title{
    font-size:clamp(40px,11vw,86px); font-weight:900; color:#fff; line-height:1.05;
    -webkit-text-stroke:3px #ff5aa7; text-shadow:0 8px 0 rgba(0,0,0,.12);
  }
  .subtitle{ font-size:clamp(18px,5vw,28px); font-weight:800; color:var(--ink); background:rgba(255,255,255,.7);
    padding:8px 18px; border-radius:20px; }
  .bigbtn{
    cursor:pointer; border:none; color:#fff; font-weight:900; font-family:inherit;
    font-size:clamp(28px,7vw,44px); padding:18px 46px; border-radius:60px;
    background:linear-gradient(180deg,#ff9edb,#ff5aa7); box-shadow:0 10px 0 #d63384, 0 14px 24px rgba(0,0,0,.2);
    display:flex; align-items:center; gap:14px;
  }
  .bigbtn.green{ background:linear-gradient(180deg,#8ce99a,#40c057); box-shadow:0 10px 0 #2f9e44,0 14px 24px rgba(0,0,0,.2); }
  .bigbtn:active{ transform:translateY(6px); box-shadow:0 4px 0 #d63384,0 6px 12px rgba(0,0,0,.2); }
  .bigbtn.green:active{ box-shadow:0 4px 0 #2f9e44,0 6px 12px rgba(0,0,0,.2); }
  .bounce{ animation:bnc 1.4s ease-in-out infinite; }
  @keyframes bnc{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

  .stickerbook{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:min(92vw,560px);
    background:rgba(255,255,255,.72); border:5px solid #fff; border-radius:26px; padding:16px;
    box-shadow:0 10px 0 rgba(0,0,0,.08);
  }
  .sticker{ font-size:clamp(30px,8vw,46px); animation:pop-in .5s ease backwards; }
  .sticker.empty{ opacity:.28; filter:grayscale(1); }
  @keyframes pop-in{ from{ transform:scale(0) rotate(-40deg); opacity:0 } to{ transform:scale(1) } }

  .floatTitleEmoji{ position:absolute; font-size:60px; opacity:.9; animation:floaty 4s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-22px) rotate(6deg)} }

  /* confetti for celebration */
  .confetti{ position:absolute; z-index:41; width:14px; height:20px; border-radius:3px; pointer-events:none; }

  /* tap ripple */
  .ripple{ position:absolute; z-index:8; border-radius:50%; border:5px solid rgba(255,255,255,.9);
    pointer-events:none; animation:rip .5s ease-out forwards; }
  @keyframes rip{ from{ transform:scale(.3); opacity:.9 } to{ transform:scale(1.8); opacity:0 } }
</style>
</head>
<body>
<div id="game">
  <div class="ground"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="badge" id="starBadge">⭐ <span id="stars">0</span></div>
    <div class="badge" id="levelBadge">🎪 Lvl <span id="level">1</span></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="soundBtn" title="Sound">🔊</button>
    <button class="iconbtn" id="homeBtn" title="Home">🏠</button>
  </div>

  <div id="prizeWrap">
    <div id="prizeBar"><div id="prizeFill"></div></div>
    <div id="prizeLabel">Pop to fill the prize jar! 🏆</div>
  </div>

  <div id="mascot">🐰</div>
  <div id="praise"></div>

  <!-- START overlay -->
  <div class="overlay" id="startScreen">
    <div class="floatTitleEmoji" style="left:14%;top:16%">🐸</div>
    <div class="floatTitleEmoji" style="right:12%;top:20%;animation-delay:.6s">🦋</div>
    <div class="floatTitleEmoji" style="left:20%;bottom:26%;animation-delay:1s">🐥</div>
    <div class="floatTitleEmoji" style="right:18%;bottom:22%;animation-delay:1.4s">🐠</div>
    <div class="title">Bubble Pop<br>Safari 🫧</div>
    <div class="subtitle">Pop the bubbles &amp; meet the animals!</div>
    <button class="bigbtn bounce" id="playBtn">▶️ Play!</button>
    <div class="subtitle" style="font-size:16px">Best with sound on 🔊 — tap Play to start</div>
  </div>

  <!-- REWARD overlay -->
  <div class="overlay hidden" id="rewardScreen">
    <div class="title" style="font-size:clamp(34px,9vw,64px)">You got a sticker! 🎉</div>
    <div id="newSticker" style="font-size:110px" class="bounce">⭐</div>
    <div class="subtitle">Your Sticker Book</div>
    <div class="stickerbook" id="stickerbook"></div>
    <button class="bigbtn green" id="keepBtn">Keep Popping! 🫧</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const game = document.getElementById('game');
  const W = () => window.innerWidth, H = () => window.innerHeight;

  // ---------- Content: things that live inside bubbles ----------
  // Each: emoji + spoken/shown name. Grouped so learning feels varied (Reader Rabbit style).
  const ITEMS = [
    {e:'🐶',n:'Dog'},{e:'🐱',n:'Cat'},{e:'🐭',n:'Mouse'},{e:'🐰',n:'Bunny'},
    {e:'🦊',n:'Fox'},{e:'🐻',n:'Bear'},{e:'🐼',n:'Panda'},{e:'🐨',n:'Koala'},
    {e:'🦁',n:'Lion'},{e:'🐯',n:'Tiger'},{e:'🐮',n:'Cow'},{e:'🐷',n:'Pig'},
    {e:'🐸',n:'Frog'},{e:'🐵',n:'Monkey'},{e:'🐔',n:'Hen'},{e:'🐧',n:'Penguin'},
    {e:'🐦',n:'Bird'},{e:'🐤',n:'Chick'},{e:'🦆',n:'Duck'},{e:'🦉',n:'Owl'},
    {e:'🐴',n:'Horse'},{e:'🦄',n:'Unicorn'},{e:'🐝',n:'Bee'},{e:'🦋',n:'Butterfly'},
    {e:'🐢',n:'Turtle'},{e:'🐠',n:'Fish'},{e:'🐬',n:'Dolphin'},{e:'🐙',n:'Octopus'},
    {e:'🦀',n:'Crab'},{e:'🐘',n:'Elephant'},{e:'🦒',n:'Giraffe'},{e:'🦓',n:'Zebra'},
    {e:'🐑',n:'Sheep'},{e:'🐐',n:'Goat'},{e:'🦔',n:'Hedgehog'},{e:'🐿️',n:'Squirrel'},
    {e:'🍎',n:'Apple'},{e:'🍌',n:'Banana'},{e:'🍓',n:'Strawberry'},{e:'🍊',n:'Orange'},
    {e:'🍇',n:'Grapes'},{e:'🍉',n:'Watermelon'},{e:'⭐',n:'Star'},{e:'🌈',n:'Rainbow'},
    {e:'🚗',n:'Car'},{e:'🚀',n:'Rocket'},{e:'⚽',n:'Ball'},{e:'🎈',n:'Balloon'},
  ];
  const BUBBLE_COLORS = ['#ff9ec4','#ffd38a','#a0e7a0','#9fd8ff','#c3a8ff','#ffb3b3','#8ff0e0','#ffe08a'];
  const PRAISE = ['Yay!','Great job!','Wow!','Amazing!','Super!','You did it!','Hooray!','Nice!','Awesome!','Woohoo!'];
  const REWARD_STICKERS = ['⭐','🏅','🎖️','🌟','🍭','🧁','🎁','🦄','🌈','👑','🏆','💎','🎀','🍀','🎨','🚀'];

  // ---------- State ----------
  let stars = 0, level = 1, popsThisPrize = 0;
  const POPS_PER_PRIZE = 10;
  let earnedStickers = [];
  let running = false, muted = false;
  const bubbles = new Set();
  let spawnTimer = 0, lastTime = 0;

  const el = {
    stars:document.getElementById('stars'), level:document.getElementById('level'),
    prizeFill:document.getElementById('prizeFill'), prizeLabel:document.getElementById('prizeLabel'),
    praise:document.getElementById('praise'), mascot:document.getElementById('mascot'),
    startScreen:document.getElementById('startScreen'), rewardScreen:document.getElementById('rewardScreen'),
    stickerbook:document.getElementById('stickerbook'), newSticker:document.getElementById('newSticker'),
    soundBtn:document.getElementById('soundBtn'),
  };

  // ---------- Audio (Web Audio API — fully self-contained) ----------
  let AC = null;
  function audio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
  function tone(freq, dur, type='sine', vol=0.2, when=0, glideTo=null){
    const ac = audio(); if(!ac || muted) return;
    const t0 = ac.currentTime + when;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0+dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g).connect(ac.destination);
    o.start(t0); o.stop(t0+dur+0.02);
  }
  function popSound(){
    // bright "bloop" — quick upward glide + a little sparkle
    const base = 380 + Math.random()*140;
    tone(base, 0.16, 'sine', 0.28, 0, base*2.4);
    tone(base*3, 0.09, 'triangle', 0.10, 0.02);
  }
  function goldSound(){
    [523,659,784,1047].forEach((f,i)=>tone(f,0.16,'triangle',0.22,i*0.07));
  }
  function cheerSound(){
    const notes=[523,587,659,784,880,1047];
    notes.forEach((f,i)=>tone(f,0.22,'triangle',0.22,i*0.09));
    tone(1568,0.5,'sine',0.14,notes.length*0.09);
  }
  function noteBlip(){ tone(660,0.08,'square',0.06); }

  // Gentle background music — soft looping arpeggio
  let musicTimer=null, musicStep=0;
  const MELODY=[523,659,784,659,587,698,880,698,523,659,784,988,880,784,659,587];
  function startMusic(){
    stopMusic();
    musicTimer = setInterval(()=>{
      if(muted) return;
      const f = MELODY[musicStep % MELODY.length];
      tone(f, 0.4, 'sine', 0.045);
      tone(f/2, 0.5, 'sine', 0.03);
      musicStep++;
    }, 460);
  }
  function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }

  // Speech — says the name of the popped thing (Reader Rabbit-style naming)
  let voice=null;
  function pickVoice(){
    if(!('speechSynthesis' in window)) return;
    const vs = speechSynthesis.getVoices();
    voice = vs.find(v=>/en(-|_)?(US|GB)?/i.test(v.lang) && /female|zira|samantha|google us/i.test(v.name))
         || vs.find(v=>/^en/i.test(v.lang)) || vs[0] || null;
  }
  if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
  function say(text){
    if(muted || !('speechSynthesis' in window)) return;
    try{
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      if(voice) u.voice = voice;
      u.rate = 0.9; u.pitch = 1.35; u.volume = 1;
      speechSynthesis.speak(u);
    }catch(e){}
  }

  // ---------- Helpers ----------
  const rand = (a,b)=>a+Math.random()*(b-a);
  const pick = arr => arr[(Math.random()*arr.length)|0];

  function updateHUD(){
    el.stars.textContent = stars;
    el.level.textContent = level;
    const pct = Math.min(100, (popsThisPrize/POPS_PER_PRIZE)*100);
    el.prizeFill.style.width = pct+'%';
  }

  // ---------- Bubbles ----------
  function spawnBubble(){
    const size = rand(84, 128) * (W()<520?0.9:1);
    const item = pick(ITEMS);
    const special = Math.random();
    const isGold = special > 0.92;
    const isRainbow = !isGold && special > 0.85;

    const b = document.createElement('div');
    b.className = 'bubble wobble' + (isGold?' gold':'') + (isRainbow?' rainbow':'');
    b.style.width = b.style.height = size+'px';
    const color = isGold ? '#ffe08a' : pick(BUBBLE_COLORS);
    b.style.background += `, radial-gradient(circle at 50% 55%, ${color}cc, ${color}55 70%, ${color}22 100%)`;
    b.style.left = rand(6, W()-size-6) + 'px';
    b.style.top = (H()+size) + 'px';
    b.style.animationDelay = rand(0,3)+'s';

    const em = document.createElement('div');
    em.className='emoji'; em.textContent = item.e;
    em.style.fontSize = (size*0.42)+'px';
    b.appendChild(em);

    const speed = rand(38, 72) * (1 + (level-1)*0.06);   // px/sec, rises slowly with level
    const sway = rand(-1,1);
    const data = { el:b, item, size, y:H()+size, x:parseFloat(b.style.left),
                   speed, sway, swayT:rand(0,6), gold:isGold, rainbow:isRainbow, popped:false };
    b._d = data;
    bubbles.add(data);

    const onPop = (ev)=>{ ev.preventDefault(); ev.stopPropagation();
      const r = b.getBoundingClientRect();
      popBubble(data, r.left + r.width/2, r.top + r.height/2); };
    b.addEventListener('pointerdown', onPop, {passive:false});

    game.appendChild(b);
  }

  function popBubble(d, cx, cy){
    if(d.popped) return; d.popped = true;
    bubbles.delete(d);
    d.el.remove();

    const color = getComputedStyle(d.el).borderColor || '#fff';
    burst(cx, cy, d.gold ? '#ffcf33' : color, d.gold?22:14);
    ripple(cx, cy, d.size);
    flyEmoji(cx, cy, d.item.e);
    showWord(cx, cy, d.item.n);

    let gain = 1;
    if(d.gold){ gain = 5; goldSound(); confettiBurst(cx,cy,26); }
    else if(d.rainbow){ gain = 3; goldSound(); }
    else { popSound(); }
    say(d.item.n);

    stars += gain;
    popsThisPrize += gain;

    // occasional spoken praise
    if(Math.random() < 0.22) setTimeout(()=>{ showPraise(pick(PRAISE)); }, 260);

    updateHUD();

    if(popsThisPrize >= POPS_PER_PRIZE){ giveReward(); }
  }

  function burst(x,y,color,count){
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className='piece';
      const s = rand(8,16);
      p.style.width=p.style.height=s+'px';
      p.style.left=x+'px'; p.style.top=y+'px';
      p.style.borderRadius = Math.random()<0.5?'50%':'3px';
      p.style.background = Math.random()<0.5 ? color : pick(BUBBLE_COLORS);
      p.style.boxShadow='0 0 6px rgba(255,255,255,.6)';
      game.appendChild(p);
      const ang = rand(0,Math.PI*2), dist = rand(50,140);
      const dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist - 30;
      p.animate([
        {transform:'translate(0,0) scale(1)', opacity:1},
        {transform:`translate(${dx}px,${dy}px) scale(0)`, opacity:0}
      ], {duration:rand(500,850), easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>p.remove();
    }
  }

  function ripple(x,y,size){
    const r=document.createElement('div'); r.className='ripple';
    r.style.width=r.style.height=size+'px';
    r.style.left=(x-size/2)+'px'; r.style.top=(y-size/2)+'px';
    game.appendChild(r); setTimeout(()=>r.remove(),520);
  }

  function flyEmoji(x,y,emoji){
    const f=document.createElement('div'); f.className='flyEmoji'; f.textContent=emoji;
    f.style.left=(x-32)+'px'; f.style.top=(y-32)+'px';
    game.appendChild(f);
    f.animate([
      {transform:'scale(.6) rotate(0)', opacity:1, offset:0},
      {transform:'scale(1.7) rotate(-12deg)', opacity:1, offset:.35},
      {transform:'scale(1.4) rotate(10deg) translateY(-40px)', opacity:1, offset:.7},
      {transform:'scale(1) rotate(0) translateY(-120px)', opacity:0, offset:1}
    ], {duration:1100, easing:'ease-out'}).onfinish=()=>f.remove();
  }

  function showWord(x,y,text){
    const w=document.createElement('div'); w.className='word'; w.textContent=text;
    game.appendChild(w);
    const ww = w.offsetWidth;
    w.style.left=(x-ww/2)+'px'; w.style.top=(y+18)+'px';
    w.animate([
      {transform:'translateY(0) scale(.6)', opacity:0, offset:0},
      {transform:'translateY(-4px) scale(1.1)', opacity:1, offset:.3},
      {transform:'translateY(-30px) scale(1)', opacity:1, offset:.75},
      {transform:'translateY(-60px) scale(1)', opacity:0, offset:1}
    ], {duration:1200, easing:'ease-out'}).onfinish=()=>w.remove();
  }

  function showPraise(text){
    el.praise.textContent = text;
    el.praise.classList.remove('show'); void el.praise.offsetWidth;
    el.praise.classList.add('show');
    el.mascot.classList.remove('cheer'); void el.mascot.offsetWidth;
    el.mascot.classList.add('cheer');
  }

  function confettiBurst(x,y,count){
    const colors=['#ff5aa7','#ffd166','#40c057','#4dabf7','#c3a8ff','#ff922b'];
    for(let i=0;i<count;i++){
      const c=document.createElement('div'); c.className='confetti';
      c.style.left=x+'px'; c.style.top=y+'px';
      c.style.background=pick(colors);
      game.appendChild(c);
      const dx=rand(-160,160), dy=rand(-40,-220), rot=rand(-540,540);
      c.animate([
        {transform:'translate(0,0) rotate(0)', opacity:1},
        {transform:`translate(${dx}px,${-dy+260}px) rotate(${rot}deg)`, opacity:0}
      ],{duration:rand(900,1500), easing:'cubic-bezier(.15,.6,.3,1)'}).onfinish=()=>c.remove();
    }
  }

  // ---------- Rewards / gamification ----------
  function giveReward(){
    popsThisPrize = 0;
    level++;
    const sticker = REWARD_STICKERS[(earnedStickers.length) % REWARD_STICKERS.length];
    earnedStickers.push(sticker);
    updateHUD();
    running = false;
    stopMusic();
    // clear remaining bubbles gently
    bubbles.forEach(d=>{ d.el.remove(); }); bubbles.clear();

    el.newSticker.textContent = sticker;
    renderStickerbook();
    el.rewardScreen.classList.remove('hidden');
    cheerSound();
    el.mascot.classList.add('cheer');
    say('You got a '+ stickerName(sticker) + '! '+ pick(PRAISE));
    // big confetti rain
    for(let i=0;i<40;i++) setTimeout(()=>confettiBurst(rand(0,W()), -20, 3), i*40);
  }
  function stickerName(s){
    const map={'⭐':'star','🏅':'medal','🎖️':'medal','🌟':'gold star','🍭':'lollipop','🧁':'cupcake',
      '🎁':'present','🦄':'unicorn','🌈':'rainbow','👑':'crown','🏆':'trophy','💎':'gem','🎀':'bow',
      '🍀':'clover','🎨':'paint','🚀':'rocket'};
    return map[s]||'prize';
  }
  function renderStickerbook(){
    el.stickerbook.innerHTML='';
    const total = 12;
    for(let i=0;i<Math.max(total, earnedStickers.length);i++){
      const d=document.createElement('div');
      if(i < earnedStickers.length){ d.className='sticker'; d.textContent=earnedStickers[i]; d.style.animationDelay=(i*0.05)+'s'; }
      else { d.className='sticker empty'; d.textContent='❔'; }
      el.stickerbook.appendChild(d);
    }
  }

  // ---------- Game loop ----------
  function loop(t){
    if(!running){ lastTime=t; return; }
    const dt = Math.min(0.05, (t-lastTime)/1000 || 0); lastTime=t;

    // spawn
    spawnTimer -= dt;
    const target = 4 + Math.min(4, Math.floor(level/2)); // how many on screen
    const spawnGap = Math.max(0.5, 1.4 - level*0.05);
    if(spawnTimer<=0 && bubbles.size < target){ spawnBubble(); spawnTimer = spawnGap; }

    // move
    bubbles.forEach(d=>{
      d.y -= d.speed*dt;
      d.swayT += dt;
      const swayX = Math.sin(d.swayT*1.2)*18*d.sway;
      d.el.style.transform = `translate(${swayX}px, ${d.y - (H()+d.size)}px)`;
      if(d.y < -d.size){ // floated off top — gently remove (no penalty; keep it stress-free)
        d.el.remove(); bubbles.delete(d);
      }
    });

    requestAnimationFrame(loop);
  }

  function startGame(){
    audio(); if(AC && AC.state==='suspended') AC.resume();
    el.startScreen.classList.add('hidden');
    el.rewardScreen.classList.add('hidden');
    running = true; lastTime = performance.now(); spawnTimer = 0;
    startMusic();
    requestAnimationFrame(loop);
  }

  // ---------- Clouds ----------
  function makeClouds(){
    const clouds=['☁️','⛅','☁️'];
    for(let i=0;i<3;i++){
      const c=document.createElement('div'); c.className='cloud'; c.textContent=pick(clouds);
      c.style.top=rand(4,34)+'%'; c.style.fontSize=rand(46,90)+'px';
      c.style.animationDuration=rand(28,55)+'s'; c.style.animationDelay=(-rand(0,30))+'s';
      game.appendChild(c);
    }
  }

  // ---------- Controls ----------
  document.getElementById('playBtn').addEventListener('click', startGame);
  document.getElementById('keepBtn').addEventListener('click', startGame);
  document.getElementById('homeBtn').addEventListener('click', ()=>{
    running=false; stopMusic();
    bubbles.forEach(d=>d.el.remove()); bubbles.clear();
    el.rewardScreen.classList.add('hidden');
    el.startScreen.classList.remove('hidden');
  });
  el.soundBtn.addEventListener('click', ()=>{
    muted = !muted;
    el.soundBtn.textContent = muted ? '🔇' : '🔊';
    if(muted){ speechSynthesis && speechSynthesis.cancel(); }
    else { noteBlip(); if(running) startMusic(); }
  });

  // Prevent scrolling/zoom gestures on mobile
  document.addEventListener('gesturestart', e=>e.preventDefault());
  document.addEventListener('dblclick', e=>e.preventDefault(), {passive:false});
  window.addEventListener('contextmenu', e=>e.preventDefault());

  // init
  makeClouds();
  renderStickerbook();
  updateHUD();
})();
</script>
</body>
</html>
